# Continuous Integration for the FoodieGo frontend.
#
# Why: every push and every PR into `main` is installed, linted, type-checked,
# and built — so broken UI code is caught before it can be merged or deployed.
# Make this check "required" in the repo's branch-protection ruleset to gate merges.
name: CI

# Run on pushes to main (post-merge sanity) and on PRs targeting main (the gate).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Pull the repo contents into the runner.
      - uses: actions/checkout@v4

      # Install Node 20 LTS and cache npm downloads for faster runs.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Clean, reproducible install from package-lock.json.
      - run: npm ci

      # Lint, type-check, then a production build (all must succeed).
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
